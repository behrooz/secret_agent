---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-sync-operator
  namespace: secret-sync-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: secret-sync-operator
rules:
  # Manage SecretSync CRDs
  - apiGroups: ["sync.yourorg.io"]
    resources: ["secretsyncs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["sync.yourorg.io"]
    resources: ["secretsyncs/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["sync.yourorg.io"]
    resources: ["secretsyncs/finalizers"]
    verbs: ["update"]
  # Manage Kubernetes Secrets
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Read namespaces (for cross-namespace secret creation)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: secret-sync-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: secret-sync-operator
subjects:
  - kind: ServiceAccount
    name: secret-sync-operator
    namespace: secret-sync-system