apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: secretsyncs.sync.bugx.ir
spec:
  group: sync.bugx.ir
  names:
    kind: SecretSync
    listKind: SecretSyncList
    plural: secretsyncs
    singular: secretsync
    shortNames:
      - ss
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - secretName
              properties:
                secretName:
                  type: string
                  description: Name of the secret to fetch from the external API
                targetNamespace:
                  type: string
                  description: Namespace to create the K8s secret in (defaults to same namespace)
                targetSecretName:
                  type: string
                  description: Name of the K8s secret to create (defaults to secretName)
                refreshInterval:
                  type: string
                  default: "1h"
                  description: How often to re-sync (e.g. "30m", "1h", "24h")
            status:
              type: object
              properties:
                ready:
                  type: boolean
                lastSyncTime:
                  type: string
                  format: date-time
                message:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Secret
          type: string
          jsonPath: .spec.secretName
        - name: Ready
          type: boolean
          jsonPath: .status.ready
        - name: Last Sync
          type: string
          jsonPath: .status.lastSyncTime
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp