# ─────────────────────────────────────────────────
# Example 1 — Simplest usage
# Fetches "authapi" from the external API and creates
# a K8s secret named "authapi" in the same namespace.
# ─────────────────────────────────────────────────
apiVersion: sync.bugx.ir/v1alpha1
kind: SecretSync
metadata:
  name: my-auth-secrets
  namespace: default
spec:
  secretName: authapi

---
# ─────────────────────────────────────────────────
# Example 2 — With explicit target name and namespace
# ─────────────────────────────────────────────────
apiVersion: sync.bugx.ir/v1alpha1
kind: SecretSync
metadata:
  name: database-credentials
  namespace: production
spec:
  secretName: database-credentials
  targetSecretName: db-creds
  targetNamespace: production
  refreshInterval: "30m"

---
# ─────────────────────────────────────────────────
# Example 3 — Inject the synced secret into a Pod
# The secret is created by the operator; just reference it.
# ─────────────────────────────────────────────────
apiVersion: v1
kind: Pod
metadata:
  name: my-app
  namespace: default
spec:
  containers:
    - name: app
      image: my-app:latest

      # Option A: inject as environment variables
      envFrom:
        - secretRef:
            name: authapi          # matches spec.secretName (or targetSecretName)

      # Option B: mount as files in /etc/secrets/
      volumeMounts:
        - name: authapi-vol
          mountPath: /etc/secrets
          readOnly: true

  volumes:
    - name: authapi-vol
      secret:
        secretName: authapi